# doc-to-abstract configuration
# Copy this file to doc-to-abstract.yaml and edit it.

# Required: Title of your paper
title: "My Research Title"

# Required: Author list with affiliations
authors:
  - name: "Alice Example"
    affiliation: "Department of Physics, Example University"
    email: "alice@example.com"
  - name: "Bob Sample"
    affiliation: "Example Institute"

# Required: Path(s) to your main materials (.pdf / .pptx)
materials:
  - "manuscript.pdf"
# For a single file, you can also use: materials: "manuscript.pdf"
# Legacy keys 'slides' and 'slides_pdf' are also supported.

# Optional: Language for the abstract (default: English)
language: "English"

# Optional: Writing tone (default: formal)
# Options: formal, semi-formal, casual
tone: "formal"

# Optional: Length constraints (specify one or neither, default: no limit)
# max_words: 300
# max_characters: 1500

# Optional: Reference papers for context and style
# references:
#   - "refs/paper1.pdf"
#   - "refs/paper2.pdf"

# Optional: Supplementary materials (e.g., call for papers, workshop description)
# supplementary:
#   - "cfp.pdf"
#   - "workshop-description.pdf"

# Optional: Conference/workshop template file (.tex, .docx, or .pdf)
# The template content is used to understand format requirements and guidelines.
# For .tex and .docx templates, the abstract is also written directly into a copy.
# template: "template.tex"

# Optional: Output file path (default: abstract.tex)
output: "abstract.tex"

# Optional: Additional instructions for the LLM (list of strings)
# extra_instructions:
#   - "Focus on the numerical results."
#   - "Emphasize the novelty of the proposed method."
# A single string is also supported: extra_instructions: "Focus on results."

# Optional: Per-file annotations (importance and comments)
# annotations:
#   "manuscript.pdf":
#     importance: "high"
#     comment: "Focus on the results section"
#   "refs/paper1.pdf":
#     importance: "low"
#     comment: "Background context only"
